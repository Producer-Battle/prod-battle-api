name: deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: rg.fr-par.scw.cloud/prod-battle-registry
  IMAGE_NAME: prod-battle-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Compute the image tag set. Every push to main gets:
  #   - <short-sha>   (immutable, used for rollbacks + the container PATCH)
  #   - latest        (floating, used by tofu as the bootstrap image tag)
  # ─────────────────────────────────────────────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      primary_tag: ${{ steps.tag.outputs.primary_tag }}
      secondary_tag: ${{ steps.tag.outputs.secondary_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute tags
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "primary_tag=${SHORT_SHA}"   >> "$GITHUB_OUTPUT"
          echo "secondary_tag=latest"      >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # Build the API image and push it to Scaleway Container Registry. Also
  # builds the ffmpeg job image that lives in jobs/ffmpeg/.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.primary_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.secondary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ffmpeg job image
        uses: docker/build-push-action@v6
        with:
          context: ./jobs/ffmpeg
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ needs.meta.outputs.primary_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ needs.meta.outputs.secondary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Apply Drizzle migrations BEFORE rolling the container. Migrations are
  # expected to be forward-compatible (additive columns / tables, no drops
  # the old image still references) so the currently-live old image keeps
  # working until the redeploy completes. If migrate fails, we abort: the
  # container stays on the previous image and schema, the image tag we just
  # built sits in the registry unused.
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "DATABASE_URL secret not set — skipping migrate (bootstrap)."
            exit 0
          fi
          pnpm db:migrate

  # ─────────────────────────────────────────────────────────────────────────────
  # Roll the Scaleway Serverless Container to the freshly-pushed SHA-tagged
  # image. We PATCH `registry_image` with the immutable <sha> tag so the
  # container config always reflects exactly which commit is live and a
  # rollback is just "PATCH back to a previous SHA".
  #
  # The tofu module sets `lifecycle.ignore_changes = [registry_image]` on
  # the container so the next `tofu apply` doesn't fight CI by resetting
  # the image back to the tag literal in envs/prod/main.tf.
  # ─────────────────────────────────────────────────────────────────────────────
  redeploy:
    needs: [meta, build, migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SCW_API_BASE: https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers
    steps:
      # Job-level `env` can reference neither `secrets.*` nor `env.*`, so we
      # compute the container ID and the full image ref here and expose them
      # as step outputs for the later steps (roll, wait, smoke-test, rollback).
      - name: Pick container ID + image
        id: guard
        env:
          CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
          PRIMARY_TAG: ${{ needs.meta.outputs.primary_tag }}
        run: |
          if [[ -z "$CONTAINER_ID" ]]; then
            echo "SCW_CONTAINER_ID secret not set — skipping redeploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "container_id=${CONTAINER_ID}" >> "$GITHUB_OUTPUT"
            echo "full_image=${REGISTRY}/${IMAGE_NAME}:${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture current image for rollback
        if: steps.guard.outputs.skip != 'true'
        id: prev
        env:
          CONTAINER_ID: ${{ steps.guard.outputs.container_id }}
        run: |
          PREV=$(curl -s --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            "${SCW_API_BASE}/${CONTAINER_ID}" | jq -r '.registry_image')
          echo "Previous image: ${PREV}"
          echo "image=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Roll container to ${{ needs.meta.outputs.primary_tag }}
        if: steps.guard.outputs.skip != 'true'
        env:
          CONTAINER_ID: ${{ steps.guard.outputs.container_id }}
          FULL_IMAGE: ${{ steps.guard.outputs.full_image }}
        run: |
          echo "Rolling container ${CONTAINER_ID} to: ${FULL_IMAGE}"
          HTTP_STATUS=$(curl --silent --output /tmp/scw_response.json --write-out "%{http_code}" \
            --request PATCH \
            --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            --header "Content-Type: application/json" \
            --data "$(jq -nc --arg img "$FULL_IMAGE" '{registry_image: $img, redeploy: true}')" \
            "${SCW_API_BASE}/${CONTAINER_ID}")
          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/scw_response.json
          if [[ "${HTTP_STATUS}" -lt 200 || "${HTTP_STATUS}" -ge 300 ]]; then
            echo "::error::Scaleway PATCH returned non-2xx: ${HTTP_STATUS}"
            exit 1
          fi

      - name: Wait for container to become ready
        if: steps.guard.outputs.skip != 'true'
        id: wait
        env:
          CONTAINER_ID: ${{ steps.guard.outputs.container_id }}
        run: |
          # Poll for up to 5 minutes. Scaleway transitions: pending -> ready (ok)
          # or pending -> error (bad). Scaleway is known to flap between pending
          # and "internal error" during the first ~10s of a PATCH — so only fail
          # after we've seen `error` persist across 3 consecutive polls (~15s).
          error_streak=0
          for i in $(seq 1 60); do
            BODY=$(curl -s --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
              "${SCW_API_BASE}/${CONTAINER_ID}")
            STATUS=$(echo "$BODY" | jq -r '.status')
            ERR=$(echo "$BODY" | jq -r '.error_message // ""')
            echo "[$i/60] status=${STATUS} err=${ERR}"
            if [[ "$STATUS" == "ready" ]]; then
              echo "result=ready" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$STATUS" == "error" ]]; then
              error_streak=$((error_streak + 1))
              if [[ $error_streak -ge 3 ]]; then
                echo "result=error" >> "$GITHUB_OUTPUT"
                echo "::error::Scaleway container failed to deploy (3 consecutive errors): ${ERR}"
                exit 1
              fi
            else
              error_streak=0
            fi
            sleep 5
          done
          echo "result=timeout" >> "$GITHUB_OUTPUT"
          echo "::error::Container did not reach 'ready' within 5 minutes"
          exit 1

      - name: Smoke-test /health
        if: steps.wait.outputs.result == 'ready'
        env:
          CONTAINER_ID: ${{ steps.guard.outputs.container_id }}
        run: |
          URL=$(curl -s --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            "${SCW_API_BASE}/${CONTAINER_ID}" | jq -r '.domain_name')
          echo "Hitting https://${URL}/health"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /tmp/health.txt -w "%{http_code}" "https://${URL}/health")
            echo "[$i/12] HTTP ${CODE}"
            if [[ "$CODE" == "200" ]]; then
              cat /tmp/health.txt
              echo ""
              exit 0
            fi
            sleep 5
          done
          echo "::error::Health check did not return 200 within 60s"
          cat /tmp/health.txt || true
          exit 1

      - name: Roll back to previous image on failure
        if: failure() && steps.guard.outputs.skip != 'true' && steps.prev.outputs.image != '' && steps.prev.outputs.image != 'null'
        env:
          CONTAINER_ID: ${{ steps.guard.outputs.container_id }}
          PREV: ${{ steps.prev.outputs.image }}
          FULL_IMAGE: ${{ steps.guard.outputs.full_image }}
        run: |
          echo "::warning::Deploy failed - rolling ${CONTAINER_ID} back to ${PREV}"
          curl -s --output /tmp/rollback.json --write-out "HTTP %{http_code}\n" \
            --request PATCH \
            --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            --header "Content-Type: application/json" \
            --data "$(jq -nc --arg img "$PREV" '{registry_image: $img, redeploy: true}')" \
            "${SCW_API_BASE}/${CONTAINER_ID}"
          cat /tmp/rollback.json
          echo ""
          echo "::warning::Rollback PATCH sent. Investigate the failing image (${FULL_IMAGE}) before the next deploy."
