name: deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: rg.fr-par.scw.cloud/prod-battle-staging-registry
  IMAGE_NAME: prod-battle-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Determine the environment and image tags for downstream jobs.
  # ─────────────────────────────────────────────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.tag.outputs.env }}
      primary_tag: ${{ steps.tag.outputs.primary_tag }}
      secondary_tag: ${{ steps.tag.outputs.secondary_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "env=prod"                             >> "$GITHUB_OUTPUT"
            echo "primary_tag=${GITHUB_REF_NAME}"      >> "$GITHUB_OUTPUT"
            echo "secondary_tag=prod-latest"           >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "env=staging"                             >> "$GITHUB_OUTPUT"
            echo "primary_tag=staging-${SHORT_SHA}"        >> "$GITHUB_OUTPUT"
            echo "secondary_tag=staging-latest"            >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Build the API image and push it to Scaleway Container Registry.
  # Also builds the ffmpeg job image that lives in jobs/ffmpeg/.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.primary_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.secondary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ffmpeg job image
        uses: docker/build-push-action@v6
        with:
          context: ./jobs/ffmpeg
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ needs.meta.outputs.primary_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ needs.meta.outputs.secondary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Apply Drizzle migrations BEFORE rolling the container. Migrations are
  # expected to be forward-compatible (additive columns / tables, no drops
  # the old image still references) so the currently-live old image keeps
  # working until the redeploy completes. If migrate fails, we abort: the
  # container stays on the previous image and DB schema, the image tag we
  # just built sits in the registry unused.
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations (staging)
        if: needs.meta.outputs.env == 'staging'
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "STAGING_DATABASE_URL secret not set — cannot migrate staging DB."
            exit 1
          fi
          pnpm db:migrate

      - name: Run Drizzle migrations (prod)
        if: needs.meta.outputs.env == 'prod'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "PROD_DATABASE_URL not set — skipping prod migration."
            echo "Set this secret once the prod RDB has been provisioned."
            exit 0
          fi
          pnpm db:migrate

  # ─────────────────────────────────────────────────────────────────────────────
  # Roll the Scaleway Serverless Container to the freshly-pushed SHA-tagged
  # image. We PATCH `registry_image` with the immutable staging-<sha> (or
  # the release tag on prod) so the container config always reflects exactly
  # which commit is live and rollback is just "PATCH back to a previous SHA".
  #
  # The tofu module sets `lifecycle.ignore_changes = [registry_image]` on
  # the container resource so the next `tofu apply` doesn't fight CI by
  # resetting the image back to the literal tag in envs/*/main.tf.
  #
  # Before PATCHing we capture the currently-live registry_image into the
  # job output so the rollback step can pin back to it if the new image
  # fails to become ready.
  #
  # Prod deploy is skipped if SCW_CONTAINER_ID_PROD is not yet configured.
  # ─────────────────────────────────────────────────────────────────────────────
  redeploy:
    needs: [meta, build, migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SCW_API_BASE: https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers
      CONTAINER_ID: ${{ needs.meta.outputs.env == 'prod' && secrets.SCW_CONTAINER_ID_PROD || secrets.SCW_CONTAINER_ID_STAGING }}
      FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.primary_tag }}
    steps:
      - name: Skip if no container configured
        id: guard
        run: |
          if [[ -z "$CONTAINER_ID" ]]; then
            echo "No container ID configured for ${{ needs.meta.outputs.env }} — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture current image for rollback
        if: steps.guard.outputs.skip != 'true'
        id: prev
        run: |
          PREV=$(curl -s --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            "${SCW_API_BASE}/${CONTAINER_ID}" | jq -r '.registry_image')
          echo "Previous image: ${PREV}"
          echo "image=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Roll container to ${{ needs.meta.outputs.primary_tag }}
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "Rolling container ${CONTAINER_ID} to: ${FULL_IMAGE}"
          HTTP_STATUS=$(curl --silent --output /tmp/scw_response.json --write-out "%{http_code}" \
            --request PATCH \
            --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            --header "Content-Type: application/json" \
            --data "$(jq -nc --arg img "$FULL_IMAGE" '{registry_image: $img, redeploy: true}')" \
            "${SCW_API_BASE}/${CONTAINER_ID}")
          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/scw_response.json
          if [[ "${HTTP_STATUS}" -lt 200 || "${HTTP_STATUS}" -ge 300 ]]; then
            echo "::error::Scaleway PATCH returned non-2xx: ${HTTP_STATUS}"
            exit 1
          fi

      - name: Wait for container to become ready
        if: steps.guard.outputs.skip != 'true'
        id: wait
        run: |
          # Poll for up to 5 minutes. Scaleway transitions: pending → ready (ok)
          # or pending → error (bad). Anything else (creating, locked) keeps us polling.
          for i in $(seq 1 60); do
            BODY=$(curl -s --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
              "${SCW_API_BASE}/${CONTAINER_ID}")
            STATUS=$(echo "$BODY" | jq -r '.status')
            ERR=$(echo "$BODY" | jq -r '.error_message // ""')
            echo "[$i/60] status=${STATUS} err=${ERR}"
            if [[ "$STATUS" == "ready" ]]; then
              echo "result=ready" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$STATUS" == "error" ]]; then
              echo "result=error" >> "$GITHUB_OUTPUT"
              echo "::error::Scaleway container failed to deploy: ${ERR}"
              exit 1
            fi
            sleep 5
          done
          echo "result=timeout" >> "$GITHUB_OUTPUT"
          echo "::error::Container did not reach 'ready' within 5 minutes"
          exit 1

      - name: Smoke-test /health
        if: steps.wait.outputs.result == 'ready'
        run: |
          URL=$(curl -s --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            "${SCW_API_BASE}/${CONTAINER_ID}" | jq -r '.domain_name')
          echo "Hitting https://${URL}/health"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /tmp/health.txt -w "%{http_code}" "https://${URL}/health")
            echo "[$i/12] HTTP ${CODE}"
            if [[ "$CODE" == "200" ]]; then
              cat /tmp/health.txt
              echo ""
              exit 0
            fi
            sleep 5
          done
          echo "::error::Health check did not return 200 within 60s"
          cat /tmp/health.txt || true
          exit 1

      - name: Roll back to previous image on failure
        if: failure() && steps.guard.outputs.skip != 'true' && steps.prev.outputs.image != '' && steps.prev.outputs.image != 'null'
        run: |
          PREV="${{ steps.prev.outputs.image }}"
          echo "::warning::Deploy failed — rolling ${CONTAINER_ID} back to ${PREV}"
          curl -s --output /tmp/rollback.json --write-out "HTTP %{http_code}\n" \
            --request PATCH \
            --header "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            --header "Content-Type: application/json" \
            --data "$(jq -nc --arg img "$PREV" '{registry_image: $img, redeploy: true}')" \
            "${SCW_API_BASE}/${CONTAINER_ID}"
          cat /tmp/rollback.json
          echo ""
          echo "::warning::Rollback PATCH sent. Investigate the failing image (${FULL_IMAGE}) before the next deploy."

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish the OpenAPI spec as an npm package to GitHub Packages.
  # Only runs on prod releases, not on every push to main — the spec is already
  # uploaded as a CI artifact on every PR/push via ci.yml.
  # ─────────────────────────────────────────────────────────────────────────────
  publish-openapi:
    needs: [meta, build, redeploy]
    if: needs.meta.outputs.env == 'prod'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: pnpm openapi:emit

      - name: Publish OpenAPI npm package
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-openapi.sh
