name: deploy

on:
  push:
    branches: [main]

# Serialize deploys so rapid-fire main pushes don't race each other when
# PATCHing the Scaleway container. Earlier runs finish, then the latest
# commit rolls out. `cancel-in-progress: false` keeps the in-flight one
# alive so we don't leave the container half-rolled.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  # ghcr.io only. Scaleway registry retired 2026-06-03 along with the
  # serverless container path - it was throwing 502 / EOF on push during
  # the migration and gating the whole workflow.
  REGISTRY_GHCR: ghcr.io/producer-battle
  IMAGE_NAME: prod-battle-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Compute the image tag set. Every push to main gets:
  #   - <short-sha>   (immutable, used for rollbacks + the container PATCH)
  #   - latest        (floating, used by tofu as the bootstrap image tag)
  # ─────────────────────────────────────────────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      primary_tag: ${{ steps.tag.outputs.primary_tag }}
      secondary_tag: ${{ steps.tag.outputs.secondary_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute tags
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "primary_tag=${SHORT_SHA}"   >> "$GITHUB_OUTPUT"
          echo "secondary_tag=latest"      >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # Build the API image and push it to Scaleway Container Registry. Also
  # builds the ffmpeg job image that lives in jobs/ffmpeg/.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write # ghcr.io push via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ needs.meta.outputs.primary_tag }}
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.primary_tag }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.secondary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ffmpeg job image
        uses: docker/build-push-action@v6
        with:
          context: ./jobs/ffmpeg
          push: true
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ needs.meta.outputs.primary_tag }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ needs.meta.outputs.secondary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Apply schema migrations BEFORE rolling the container. Atlas owns the
  # application step (see atlas.hcl); the underlying SQL files in
  # src/db/migrations are still authored via drizzle-kit. On the very
  # first run against an Atlas-naive prod DB, atlas reads `baseline` from
  # atlas.hcl, creates `atlas_schema_revisions`, and marks everything
  # through baseline as already-applied - so nothing is replayed. Future
  # runs apply only migrations newer than the last applied revision.
  #
  # Migrations are expected to be forward-compatible (additive columns
  # and tables, no drops the old image still references) so the live
  # container keeps working until the redeploy completes. If apply fails
  # we abort: the container stays on the previous image and schema, the
  # freshly-built image tag sits unused in the registry.
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check DATABASE_URL is configured
        id: dbcheck
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "DATABASE_URL secret not set - skipping migrate (bootstrap)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ariga/atlas-action shells out to the `atlas` binary - install it first.
      - uses: ariga/setup-atlas@v0
        if: steps.dbcheck.outputs.skip != 'true'

      - name: Apply Atlas migrations
        if: steps.dbcheck.outputs.skip != 'true'
        uses: ariga/atlas-action/migrate/apply@v1
        with:
          url: ${{ secrets.DATABASE_URL }}
          config: file://atlas.hcl
          env: prod

  # ─────────────────────────────────────────────────────────────────────────────
  # Roll the Scaleway Serverless Container to the freshly-pushed SHA-tagged
  # image. We PATCH `registry_image` with the immutable <sha> tag so the
  # container config always reflects exactly which commit is live and a
  # rollback is just "PATCH back to a previous SHA".
  #
  # The tofu module sets `lifecycle.ignore_changes = [registry_image]` on
  # the container so the next `tofu apply` doesn't fight CI by resetting
  # the image back to the tag literal in envs/prod/main.tf.
  # ─────────────────────────────────────────────────────────────────────────────
  # ─────────────────────────────────────────────────────────────────────────────
  # Roll the K8s Deployment to the new SHA. This is the NEW deploy path -
  # post-cutover it's the only one that runs.
  # ─────────────────────────────────────────────────────────────────────────────
  k8s-deploy:
    needs: [meta, build, migrate]
    runs-on: ubuntu-latest
    # `production` GH environment gates KUBECONFIG + sensitive vars to
    # this job only. Configure secrets on the environment, not the repo.
    environment: production
    permissions:
      contents: read
    steps:
      - name: Guard - check KUBECONFIG is set
        id: guard
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          if [[ -z "$KUBECONFIG_B64" ]]; then
            echo "::warning::KUBECONFIG secret not set on the production env - skipping K8s deploy until cutover starts."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kubectl
        if: steps.guard.outputs.skip != 'true'
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Write kubeconfig
        if: steps.guard.outputs.skip != 'true'
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          # Accept either raw kubeconfig or base64-encoded.
          if echo "$KUBECONFIG_B64" | base64 -d 2>/dev/null | grep -q "apiVersion"; then
            echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          else
            printf '%s' "$KUBECONFIG_B64" > ~/.kube/config
          fi
          chmod 600 ~/.kube/config
          kubectl version --client
          kubectl get nodes

      - name: Set new image and wait for rollout
        if: steps.guard.outputs.skip != 'true'
        env:
          SHA: ${{ needs.meta.outputs.primary_tag }}
        run: |
          IMG="${REGISTRY_GHCR}/${IMAGE_NAME}:${SHA}"
          echo "Rolling deployment/api -> $IMG"
          kubectl -n app set image deployment/api api="$IMG"
          kubectl -n app rollout status deployment/api --timeout=300s

      - name: Smoke-test /health on api-k8s.prodbattle.com
        if: steps.guard.outputs.skip != 'true'
        run: |
          # During cutover api-k8s.prodbattle.com points at the cluster.
          # Post-cutover this stays as a stable second hostname for the
          # CI smoke test (keeps the test independent of the live host).
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /tmp/health.txt -w "%{http_code}" https://api-k8s.prodbattle.com/health || true)
            echo "[$i/12] HTTP ${CODE}"
            if [[ "$CODE" == "200" ]]; then
              cat /tmp/health.txt; echo
              VERSION=$(jq -r '.version' < /tmp/health.txt)
              if [[ "$VERSION" == "${{ needs.meta.outputs.primary_tag }}" ]]; then
                echo "OK - cluster is serving ${VERSION}"
                exit 0
              fi
              echo "Wrong version yet: ${VERSION}"
            fi
            sleep 5
          done
          echo "::error::api-k8s.prodbattle.com /health did not report ${{ needs.meta.outputs.primary_tag }} within 60s"
          cat /tmp/health.txt || true
          exit 1
