name: deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  # TODO: replace with your registry URL from prod-battle-infra `module.registry.endpoint`
  REGISTRY: rg.fr-par.scw.cloud/prod-battle
  IMAGE_NAME: prod-battle-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm openapi:emit

      - name: Publish OpenAPI npm package
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-openapi.sh

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SCW_REGISTRY_USER }}
          password: ${{ secrets.SCW_REGISTRY_PASSWORD }}

      - name: Compute tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.env }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ffmpeg job image
        uses: docker/build-push-action@v6
        with:
          context: ./jobs/ffmpeg
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ffmpeg:${{ steps.tag.outputs.env }}-latest

      # TODO: redeploy Serverless Container so it pulls the new image.
      # Scaleway API call: PATCH /containers/v1beta1/regions/{region}/containers/{id}
      # Or use the `scaleway/action-scw` CLI once a maintained version exists.
