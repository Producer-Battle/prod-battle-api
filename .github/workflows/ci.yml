name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      # Real Postgres so the e2e suite exercises the schema + migrations.
      # Credentials + DB name mirror what vitest.e2e expects (DATABASE_URL
      # below). Name includes "test" so seed.ts's truncate guard passes.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pbtest
          POSTGRES_PASSWORD: pbtest
          POSTGRES_DB: prod_battle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pbtest -d prod_battle_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      # MinIO for the real-S3 integration tier is started in an explicit
      # step below (not a services.* container). The official minio/minio
      # image needs `server /data` as its CMD, and services.* containers
      # in GH Actions can't override CMD - so we `docker run` it directly
      # and create the bucket with aws-cli.
    env:
      DATABASE_URL: postgres://pbtest:pbtest@localhost:5432/prod_battle_test
      # Placeholder values - the e2e suite mocks the S3 presigner so no
      # real bucket is hit, but publicUrl() reads these to build audioUrl
      # strings stored in the submissions table.
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: pb-test
      S3_REGION: us-east-1
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # pnpm version read from package.json "packageManager" field
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm db:migrate
      - run: pnpm test:e2e
      - name: Start MinIO for integration tests
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio is up"
              break
            fi
            sleep 1
          done
          docker run --rm --network host \
            -e AWS_ACCESS_KEY_ID=minioadmin \
            -e AWS_SECRET_ACCESS_KEY=minioadmin \
            amazon/aws-cli:latest \
            --endpoint-url http://localhost:9000 \
            s3 mb s3://pb-test
      - name: Start mailpit for auth-flow integration test
        run: |
          docker run -d --name mailpit \
            -p 1025:1025 -p 8025:8025 \
            -e MP_SMTP_AUTH_ACCEPT_ANY=1 \
            -e MP_SMTP_AUTH_ALLOW_INSECURE=1 \
            axllent/mailpit:latest
          for i in {1..20}; do
            if curl -sf http://localhost:8025/api/v1/messages > /dev/null; then
              echo "mailpit is up"
              break
            fi
            sleep 1
          done
      - name: Run real-S3 + auth-flow integration tests
        run: pnpm test:integration
        env:
          S3_ENDPOINT: http://localhost:9000
          S3_PUBLIC_ENDPOINT: http://localhost:9000
          S3_BUCKET: pb-test
          S3_REGION: us-east-1
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_FROM: noreply@test.local
          AUTH_BASE_URL: http://localhost:8080
          AUTH_TRUSTED_ORIGINS: http://localhost:5173
          MAILPIT_URL: http://localhost:8025
      - run: pnpm openapi:emit
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: openapi.json
